<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set New Password — Guardian AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --primary: #6366f1; --accent: #8b5cf6; --secondary: #ec4899;
        --bg: #f0f4f8; --card: #ffffff; --text: #0f172a; --muted: #64748b;
        --border: #e2e8f0; --danger: #ef4444; --warn: #f59e0b;
        --font: "Inter", sans-serif; --r: 8px;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: var(--font); background: var(--bg); color: var(--text);
        min-height: 100vh; display: flex; align-items: center; justify-content: center;
        background-image:
          radial-gradient(circle at 5% 10%, rgba(99,102,241,0.07) 0%, transparent 30%),
          radial-gradient(circle at 95% 90%, rgba(236,72,153,0.07) 0%, transparent 30%);
      }
      .card {
        background: var(--card); border-radius: 20px; padding: 44px 40px;
        width: 100%; max-width: 420px; box-shadow: 0 20px 40px -5px rgba(0,0,0,0.12);
        border: 1px solid var(--border); position: relative; overflow: hidden;
        animation: fadeIn 0.4s ease-out both;
      }
      .card::before {
        content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
      }
      @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
      .icon {
        width: 54px; height: 54px; border-radius: 14px; margin-bottom: 22px;
        background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(139,92,246,0.1));
        border: 1px solid rgba(99,102,241,0.18);
        display: flex; align-items: center; justify-content: center;
        font-size: 22px; color: var(--primary);
      }
      h2 { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
      .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; line-height: 1.5; }
      .field {
        display: flex; align-items: center; border: 1.5px solid var(--border);
        border-radius: var(--r); overflow: hidden; margin-bottom: 10px;
        transition: border-color .2s, box-shadow .2s;
      }
      .field:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
      .field-icon {
        padding: 0 14px; color: var(--muted); font-size: 14px; background: #f8fafc;
        border-right: 1.5px solid var(--border); height: 48px;
        display: flex; align-items: center; flex-shrink: 0;
      }
      .field input {
        flex: 1; padding: 13px 14px; border: none; background: transparent;
        font-size: 14px; font-family: var(--font); color: var(--text); outline: none;
      }
      .field input::placeholder { color: #94a3b8; }

      /* Password strength */
      .strength-bar {
        height: 4px; background: #e2e8f0; border-radius: 99px;
        margin-bottom: 4px; overflow: hidden;
      }
      .strength-fill {
        height: 100%; width: 0; border-radius: 99px; transition: width .3s, background .3s;
      }
      .strength-label {
        font-size: 12px; text-align: right; margin-bottom: 12px; min-height: 16px;
        transition: color .3s;
      }

      .btn {
        width: 100%; padding: 14px; border: none; border-radius: var(--r);
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: white; font-size: 15px; font-weight: 700; font-family: var(--font);
        cursor: pointer; margin-top: 4px; transition: all .2s;
        box-shadow: 0 4px 14px rgba(99,102,241,0.3);
        display: flex; align-items: center; justify-content: center; gap: 8px;
      }
      .btn:hover { opacity: .9; transform: translateY(-1px); }
      .msg {
        padding: 12px 14px; border-radius: var(--r); font-size: 13px;
        margin-bottom: 18px; display: flex; align-items: flex-start; gap: 10px; line-height: 1.5;
      }
      .msg-error  { background: rgba(239,68,68,0.08);  border: 1px solid rgba(239,68,68,0.25);  color: var(--danger); }
      .msg-warn   { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.25); color: #b45309; }
      .footer { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
      .footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon"><i class="fa-solid fa-lock-open"></i></div>
      <h2>Set New Password</h2>
      <p class="subtitle">Choose a strong password to secure your account.</p>

      {% if invalid %}
        <div class="msg msg-warn">
          <i class="fa-solid fa-triangle-exclamation" style="flex-shrink:0;margin-top:1px;"></i>
          <span>{{ error }}</span>
        </div>
        <div class="footer">
          <a href="{{ url_for('reset.forgot_password') }}">← Request a new code</a>
        </div>

      {% else %}
        {% if error %}
          <div class="msg msg-error">
            <i class="fa-solid fa-circle-exclamation" style="flex-shrink:0;margin-top:1px;"></i>
            <span>{{ error }}</span>
          </div>
        {% endif %}

        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          <div class="field">
            <span class="field-icon"><i class="fa-solid fa-lock"></i></span>
            <input type="password" name="password" id="pw"
                   placeholder="New password (min 8 chars)" required minlength="8" autofocus />
          </div>
          <div class="strength-bar"><div class="strength-fill" id="fill"></div></div>
          <div class="strength-label" id="label">&nbsp;</div>

          <div class="field">
            <span class="field-icon"><i class="fa-solid fa-lock"></i></span>
            <input type="password" name="confirm_password" id="pw2"
                   placeholder="Confirm new password" required minlength="8" />
          </div>

          <button type="submit" class="btn">
            <i class="fa-solid fa-check"></i> Set New Password
          </button>
        </form>

        <div class="footer">
          <a href="/login">← Back to Login</a>
        </div>
      {% endif %}
    </div>

    <script>
      const LABELS = ["", "Weak", "Fair", "Good", "Strong"];
      const COLORS = ["", "#ef4444", "#f59e0b", "#3b82f6", "#10b981"];

      document.getElementById("pw").addEventListener("input", function() {
        const v = this.value;
        let s = 0;
        if (v.length >= 8)  s++;
        if (v.length >= 12) s++;
        if (/[A-Z]/.test(v) && /[a-z]/.test(v)) s++;
        if (/[0-9]/.test(v) || /[^a-zA-Z0-9]/.test(v)) s++;
        document.getElementById("fill").style.width    = (s / 4 * 100) + "%";
        document.getElementById("fill").style.background = COLORS[s] || "transparent";
        document.getElementById("label").textContent   = v.length ? LABELS[s] : "";
        document.getElementById("label").style.color   = COLORS[s] || "var(--muted)";
      });
    </script>
  </body>
</html>
